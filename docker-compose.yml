services:
  endee-server:
    image: endeeio/endee-server:latest
    container_name: endee-server
    platform: linux/amd64 # ✅ ADD THIS
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "8081:8080"
    volumes:
      - ./endee-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/v1/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: endee-semantic-app
    platform: linux/amd64 # ✅ ADD THIS
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/frontend
    environment:
      - ENDEE_URL=http://endee-server:8080/api/v1
    depends_on:
      endee-server:
        condition: service_healthy
    restart: unless-stopped
